services:
  - type: web
    name: placeai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed_and_train.py
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
